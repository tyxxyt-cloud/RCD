paths:
  data_root: data
  project_root: .
  processed_dir: processed
  output_root: outputs

data:
  common_samples: data/common/road_hour_samples.csv.gz
  tclosure_samples_root: data/method_data/tclosure/dataset/samples
  tclosure_dataset_root: data/method_data/tclosure/dataset
  tclosure_sqlite: data/method_data/tclosure/runtime/tclosure_data0524.sqlite
  road_graph: data/method_data/tclosure/dataset/artifacts/road_graph.pkl
  road_metadata: data/method_data/tclosure/dataset/artifacts/road_metadata.csv.gz
  road_flow: data/method_data/tclosure/dataset/artifacts/road_flow_10m.csv.gz
  flow_steps: 6
  flow_bin_minutes: 10
  max_traj: 8
  k_hop: 1
  rebuild: false

model:
  hidden_dim: 64
  perturbation_bases: 8
  highway_emb_dim: 8
  role_emb_dim: 8
  dropout: 0.2
  rgcn_layers: 1

training:
  seed: 20260524
  device: cuda:0
  batch_size: 64
  epochs: 80
  early_stop_patience: 12
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 5.0
  lambda_grl: 1.0
  lambda_mi: 0.05
  lambda_con: 0.3
  log_every: 20
  smoke_batches: 1
  overfit_batches: 2
  num_workers: 0

evaluation:
  threshold_metric: f1
  case_top_k_trajectories: 8
